# Nginx 配置文件
# 将此文件复制到 /etc/nginx/sites-available/ai-evaluation-platform
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/ai-evaluation-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # 替换为你的域名或服务器IP

    client_max_body_size 50M;  # 允许上传大文件

    # 前端静态文件
    location / {
        root /var/www/ai-evaluation-platform/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（测试可能需要较长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
